<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sebby Sleep</title>

  <!-- PWA meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sebby Sleep" />
  <meta name="theme-color" content="#0d1117" />

  <!-- Web app manifest inline -->
  <link rel="manifest" href="manifest.json" />

  <!-- Apple touch icon — generated as inline SVG converted to data URI -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icon.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      font-family: -apple-system, sans-serif;
      overflow: hidden;
    }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: #0d1117;
      border: 1px solid #1e2d3d;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 40px rgba(26,107,138,0.25);
      position: relative;
      overflow: hidden;
    }

    .icon::before {
      content: '';
      position: absolute;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(26,107,138,0.2) 0%, transparent 70%);
      top: -30px;
      right: -30px;
    }

    .icon-s {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 46px;
      font-weight: 700;
      color: #4a90a4;
      position: relative;
      z-index: 1;
      line-height: 1;
      text-shadow: 0 2px 12px rgba(74,144,164,0.4);
    }

    .loading-text {
      font-size: 13px;
      color: #4a5a6a;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .dot-pulse {
      display: inline-flex;
      gap: 4px;
      margin-top: 4px;
    }

    .dot-pulse span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #1a6b8a;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="splash">
    <div class="icon">
      <span class="icon-s">S</span>
    </div>
    <div class="loading-text">Opening Sebby Sleep</div>
    <div class="dot-pulse">
      <span></span><span></span><span></span>
    </div>
  </div>

  <script>
    // Replace this URL with your actual Claude artifact URL
    const ARTIFACT_URL = "https://geoffbaldwin91.github.io/sebby-sleep/";

    // Short splash then redirect
    setTimeout(() => {
      window.location.replace(ARTIFACT_URL);
    }, 800);
  </script>

</body>
</html>
